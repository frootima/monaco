jenkins:
  systemMessage: "Dynatrace Monaco POC managed by Jenkins Configuration as Code"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: dynatrace-api-token
              secret: "${DYNATRACE_API_TOKEN}"
              description: Dynatrace Monaco deployment API token
          - string:
              scope: GLOBAL
              id: dynatrace-oauth-client-id
              secret: "${DYNATRACE_OAUTH_CLIENT_ID}"
              description: Dynatrace Monaco OAuth client ID
          - string:
              scope: GLOBAL
              id: dynatrace-oauth-client-secret
              secret: "${DYNATRACE_OAUTH_CLIENT_SECRET}"
              description: Dynatrace Monaco OAuth client secret

unclassified:
  location:
    url: "${JENKINS_URL}"

jobs:
  - script: >
      pipelineJob('monaco-dynatrace-deploy') {
        description('Deploys Monaco-managed dashboards and alerts to Dynatrace from the main branch.')
        keepDependencies(false)
        properties {
          disableConcurrentBuilds()
        }
        logRotator {
          numToKeep(20)
        }
        triggers {
          githubPush()
          scm('H/2 * * * *')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url(System.getenv('GITHUB_REPO_URL'))
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
            lightweight(true)
          }
        }
      }
